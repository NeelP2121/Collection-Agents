version: "3.8"

services:
  temporal:
    image: temporalio/admin-tools:latest
    command: temporal server start-dev --ip 0.0.0.0 --ui-port 8080 --ui-ip 0.0.0.0
    ports:
      - "7233:7233"
      - "8080:8080"

  worker:
    build: .
    command: python -m workers.main
    depends_on:
      - temporal
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - TEMPORAL_HOST=temporal:7233
    secrets:
      - anthropic_key
      - openai_key
      - google_key
      - vapi_key
      - vapi_phone_id
      - vapi_public_key

  voice-webhook:
    build: .
    command: uvicorn voice.webhook:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - TEMPORAL_HOST=temporal:7233
    secrets:
      - anthropic_key
      - openai_key
      - google_key
      - vapi_key
      - vapi_phone_id
      - vapi_public_key

  web-portal:
    build: .
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - TEMPORAL_HOST=temporal:7233
    secrets:
      - anthropic_key
      - openai_key
      - google_key
      - vapi_key
      - vapi_phone_id
      - vapi_public_key

secrets:
  anthropic_key:
    file: secrets/anthropic_key.txt
  openai_key:
    file: secrets/openai_key.txt
  google_key:
    file: secrets/google_key.txt
  vapi_key:
    file: secrets/vapi_key.txt
  vapi_phone_id:
    file: secrets/vapi_phone_id.txt
  vapi_public_key:
    file: secrets/vapi_public_key.txt
